<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock MVP Monitor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>Stock MVP Monitor</h1>
        <p>Mac Mini가 5분마다 갱신하는 국내주식 리서치 알림 대시보드</p>
      </div>
      <a class="button" href="https://github.com/kdh92417/stock-auto-trading-mvp/actions/workflows/market-monitor.yml">Actions</a>
    </header>

    <section class="notice">
      <strong>실전 주문은 비활성화되어 있습니다.</strong>
      <span>이 화면은 투자 조언이 아니라 매매 게이트 확인 전 리서치 알림입니다.</span>
    </section>

    <section class="stats" id="stats">
      <article><b>생성 시각</b><span id="generated">로딩 중</span></article>
      <article><b>GATE 후보</b><span id="gateCount">-</span></article>
      <article><b>SELL 검토</b><span id="sellCount">-</span></article>
      <article><b>뉴스 수</b><span id="newsCount">-</span></article>
    </section>

    <section class="layout">
      <article class="panel">
        <div class="panel-head">
          <h2>종목 후보</h2>
          <span id="liveOrders" class="badge safe">주문 OFF</span>
        </div>
        <div id="candidates" class="table-wrap"></div>
      </article>

      <article class="panel">
        <h2>주요 뉴스</h2>
        <ul id="news" class="news"></ul>
      </article>
    </section>

    <section class="panel">
      <h2>텔레그램 발송 요약</h2>
      <pre id="message">로딩 중</pre>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
